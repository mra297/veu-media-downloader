<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:transparent; font-family: 'Segoe UI Variable', 'Segoe UI', sans-serif; user-select:none; -webkit-user-select:none; }
  .toast {
    width: 360px; min-height: 80px; background: linear-gradient(135deg, #1a1f2e 0%, #232a3d 100%);
    border: 1px solid rgba(255,127,63,0.4); border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    padding: 14px 16px; display: flex; gap: 12px; align-items: center;
    color: #e6e9ef;
    transform: translateX(380px); opacity: 0;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
  }
  .toast.show { transform: translateX(0); opacity: 1; }
  .icon {
    width: 48px; height: 48px; border-radius: 10px; background-size: contain; background-position: center; background-repeat: no-repeat;
    flex-shrink: 0;
  }
  .body { flex: 1; min-width: 0; }
  .title { font-size: 14px; font-weight: 600; color: #ff7f3f; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .msg { font-size: 13px; color: #cbd0db; line-height: 1.35; max-height: 36px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
</style></head>
<body>
  <div class="toast" id="t">
    <div class="icon" id="icon"></div>
    <div class="body">
      <div class="title" id="title">Veu</div>
      <div class="msg" id="msg"></div>
    </div>
  </div>
<script>
  const q = new URLSearchParams(location.search);
  document.getElementById('title').textContent = q.get('title') || 'Veu';
  document.getElementById('msg').textContent = q.get('msg') || '';
  const ic = q.get('icon');
  if (ic) document.getElementById('icon').style.backgroundImage = `url('${ic}')`;
  setTimeout(() => document.getElementById('t').classList.add('show'), 50);
  setTimeout(() => document.getElementById('t').classList.remove('show'), 3000);
</script>
</body></html>
